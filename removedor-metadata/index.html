<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Removedor de Metadata — Zonga Elements</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    :root {
      --c-primary: #2563EB;
      --c-primary-dark: #1E40AF;
      --c-primary-soft: #DBEAFE;
      --c-bg: #FFFFFF;
      --c-bg-alt: #F8FAFC;
      --c-text: #0F172A;
      --c-text-soft: #64748B;
      --c-border: #E2E8F0;
      --c-ok: #16A34A;
      --c-err: #DC2626;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow-sm: 0 1px 3px rgba(15,23,42,0.05);
      --shadow-md: 0 10px 30px -10px rgba(37,99,235,0.18);
      --shadow-lg: 0 20px 50px -20px rgba(37,99,235,0.3);
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--c-text);
      background:
        radial-gradient(1200px 600px at 50% -200px, var(--c-primary-soft) 0%, transparent 60%),
        var(--c-bg);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image: radial-gradient(rgba(37,99,235,0.08) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: linear-gradient(to bottom, black 20%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }
    h1, h2, h3 { margin: 0; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
    p { margin: 0; }
    a { color: var(--c-primary); text-decoration: none; }

    /* ---- Layout ---- */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: var(--c-text);
    }
    .brand svg { flex-shrink: 0; }
    .back-link {
      color: var(--c-text-soft);
      font-size: 13px;
      display: inline-flex; align-items: center; gap: 4px;
      transition: color 180ms var(--ease);
    }
    .back-link:hover { color: var(--c-primary); }

    header.hero {
      text-align: center;
      margin-bottom: 32px;
    }
    .eyebrow {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-primary);
      margin-bottom: 12px;
    }
    header.hero h1 {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 800;
      margin-bottom: 12px;
    }
    header.hero p {
      color: var(--c-text-soft);
      max-width: 460px;
      margin: 0 auto;
      font-size: 15px;
    }

    /* ---- Dropzone ---- */
    .dropzone {
      display: block;
      position: relative;
      border: 2px dashed var(--c-border);
      border-radius: var(--radius-xl);
      background: #fff;
      padding: 56px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 200ms var(--ease);
      box-shadow: var(--shadow-sm);
    }
    .dropzone .logo-badge,
    .dropzone .drop-text,
    .dropzone .drop-hint { display: block; }
    .dropzone .drop-text { margin: 0 auto; }
    .dropzone:hover,
    .dropzone.is-drag {
      border-color: var(--c-primary);
      background: var(--c-primary-soft);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .dropzone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .logo-badge {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--c-primary), #60A5FA);
      border-radius: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 34px; color: #fff;
      margin-bottom: 20px;
      box-shadow: var(--shadow-md);
      letter-spacing: -0.04em;
    }
    .drop-text {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 600;
      color: var(--c-text);
    }
    .drop-text .material-icons {
      color: var(--c-primary);
      font-size: 22px;
    }
    .drop-hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--c-text-soft);
    }

    /* ---- Panel lateral (slide down en móvil, lateral en desktop) ---- */
    .panel {
      display: none;
      margin-top: 24px;
      background: #fff;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      animation: slideIn 400ms var(--ease);
    }
    .panel.show { display: block; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--c-border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
      background: var(--c-bg-alt);
    }
    .panel-head h2 {
      font-size: 15px;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .panel-head h2 .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--c-text-soft);
    }
    .panel-head h2.is-clean .dot { background: var(--c-ok); box-shadow: 0 0 0 3px rgba(22,163,74,0.2); }
    .panel-tag {
      font-size: 11px; font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--c-primary-soft);
      color: var(--c-primary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .panel-tag.ok { background: rgba(22,163,74,0.12); color: var(--c-ok); }

    .meta-list {
      max-height: 360px;
      overflow-y: auto;
      padding: 8px 0;
    }
    .meta-row {
      display: grid;
      grid-template-columns: minmax(140px, 1fr) 2fr;
      gap: 16px;
      padding: 10px 22px;
      font-size: 13px;
      border-bottom: 1px solid #F1F5F9;
    }
    .meta-row:last-child { border-bottom: 0; }
    .meta-key {
      color: var(--c-text-soft);
      font-weight: 500;
    }
    .meta-val {
      color: var(--c-text);
      word-break: break-word;
      font-family: ui-monospace, 'Courier New', monospace;
      font-size: 12px;
    }
    .meta-empty {
      padding: 24px 22px;
      text-align: center;
      color: var(--c-text-soft);
      font-size: 13px;
    }

    /* ---- Botones ---- */
    .actions { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1 1 220px;
      padding: 16px 24px;
      border: 0;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 200ms var(--ease);
    }
    .btn .material-icons { font-size: 20px; }
    .btn-primary {
      background: var(--c-primary);
      color: #fff;
      box-shadow: var(--shadow-md);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--c-primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .btn-primary:disabled {
      background: #CBD5E1;
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-ghost {
      background: transparent;
      color: var(--c-text);
      border: 1px solid var(--c-border);
    }
    .btn-ghost:hover {
      border-color: var(--c-primary);
      color: var(--c-primary);
      background: var(--c-primary-soft);
    }

    /* ---- Status ---- */
    .status {
      margin-top: 14px;
      font-size: 13px;
      min-height: 20px;
      text-align: center;
    }
    .status.ok   { color: var(--c-ok); }
    .status.err  { color: var(--c-err); }
    .status.info { color: var(--c-text-soft); }

    /* ---- Progress ---- */
    .progress {
      display: none;
      margin-top: 16px;
      height: 4px;
      background: var(--c-bg-alt);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress.show { display: block; }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--c-primary), #60A5FA);
      transition: width 180ms linear;
    }
    .progress.indeterminate .progress-fill {
      width: 40%;
      animation: indeter 1.2s ease-in-out infinite;
    }
    @keyframes indeter {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(280%); }
    }

    /* ---- File info ---- */
    .file-chip {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      margin-top: 16px;
      font-size: 13px;
    }
    .file-chip.show { display: inline-flex; }
    .file-chip .material-icons { color: var(--c-primary); font-size: 20px; }
    .file-chip strong { font-weight: 600; }
    .file-chip .size { color: var(--c-text-soft); margin-left: auto; font-family: ui-monospace, monospace; font-size: 12px; }
    .file-chip button {
      background: none; border: 0; cursor: pointer; padding: 4px; color: var(--c-text-soft);
      display: inline-flex; align-items: center;
    }
    .file-chip button:hover { color: var(--c-err); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-bar">
      <a class="brand" href="../index.html">
        <svg width="28" height="28" viewBox="0 0 100 100">
          <rect width="100" height="100" rx="22" fill="url(#g)"/>
          <text x="50" y="68" font-size="60" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-weight="800">Z</text>
          <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#60A5FA"/></linearGradient></defs>
        </svg>
        <span>Zonga Elements</span>
      </a>
      <a class="back-link" href="../index.html">← Volver</a>
    </div>

    <header class="hero">
      <span class="eyebrow">Limpieza segura</span>
      <h1>Removedor de Metadata</h1>
      <p>Elimina EXIF, ubicación, autor, fechas y cualquier rastro de tus archivos. 100% local en tu servidor.</p>
    </header>

    <label class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept="image/*,video/*,audio/*" />
      <div class="logo-badge">Z</div>
      <div class="drop-text">
        Selecciona un archivo o arrástralo aquí
        <span class="material-icons" aria-hidden="true">download</span>
      </div>
      <div class="drop-hint">Imágenes, videos y audios · Máx. 200 MB</div>
    </label>

    <div class="file-chip" id="fileChip">
      <span class="material-icons">insert_drive_file</span>
      <strong id="chipName">—</strong>
      <span class="size" id="chipSize">—</span>
      <button id="chipRemove" title="Quitar">
        <span class="material-icons">close</span>
      </button>
    </div>

    <div class="progress" id="progress"><div class="progress-fill" id="progressFill"></div></div>
    <div class="status info" id="status"></div>

    <!-- Panel: metadata actual -->
    <section class="panel" id="panelBefore">
      <div class="panel-head">
        <h2><span class="dot"></span> Metadata actual</h2>
        <span class="panel-tag">Antes</span>
      </div>
      <div class="meta-list" id="metaBefore"></div>
    </section>

    <div class="actions" id="actionsClean" style="display:none">
      <button class="btn btn-primary" id="cleanBtn">
        <span class="material-icons">cleaning_services</span>
        Limpiar mi archivo
      </button>
    </div>

    <!-- Panel: metadata después -->
    <section class="panel" id="panelAfter">
      <div class="panel-head">
        <h2 class="is-clean"><span class="dot"></span> Metadata después</h2>
        <span class="panel-tag ok">Limpio</span>
      </div>
      <div class="meta-list" id="metaAfter"></div>
    </section>

    <div class="actions" id="actionsDownload" style="display:none">
      <button class="btn btn-primary" id="downloadBtn">
        <span class="material-icons">file_download</span>
        Descargar archivo limpio
      </button>
      <button class="btn btn-ghost" id="resetBtn">
        <span class="material-icons">refresh</span>
        Otro archivo
      </button>
    </div>
  </div>

  <script>
    const API = (location.protocol === 'http:' || location.protocol === 'https:')
      ? location.origin
      : 'http://localhost:5001';

    const $ = (id) => document.getElementById(id);
    const dropzone    = $('dropzone');
    const fileInput   = $('fileInput');
    const fileChip    = $('fileChip');
    const chipName    = $('chipName');
    const chipSize    = $('chipSize');
    const chipRemove  = $('chipRemove');
    const progress    = $('progress');
    const progressFill= $('progressFill');
    const status      = $('status');
    const panelBefore = $('panelBefore');
    const panelAfter  = $('panelAfter');
    const metaBefore  = $('metaBefore');
    const metaAfter   = $('metaAfter');
    const actionsClean= $('actionsClean');
    const actionsDl   = $('actionsDownload');
    const cleanBtn    = $('cleanBtn');
    const downloadBtn = $('downloadBtn');
    const resetBtn    = $('resetBtn');

    let currentId = null;
    let currentStored = null;
    let currentOriginalName = null;

    function setStatus(msg, type = 'info') {
      status.textContent = msg;
      status.className = 'status ' + type;
    }

    function showProgress(indeterminate = true) {
      progress.classList.add('show');
      progressFill.style.width = '0%';
      if (indeterminate) progress.classList.add('indeterminate');
      else               progress.classList.remove('indeterminate');
    }
    function hideProgress() {
      progress.classList.remove('show', 'indeterminate');
      progressFill.style.width = '0%';
    }

    function formatBytes(n) {
      const units = ['B','KB','MB','GB'];
      let i = 0;
      while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
      return n.toFixed(2) + ' ' + units[i];
    }

    function renderMetadata(container, meta) {
      container.innerHTML = '';
      const entries = Object.entries(meta);
      if (!entries.length) {
        container.innerHTML = '<div class="meta-empty">Sin metadata detectable ✓</div>';
        return;
      }
      for (const [k, v] of entries) {
        const row = document.createElement('div');
        row.className = 'meta-row';
        const dk = document.createElement('div'); dk.className = 'meta-key'; dk.textContent = k;
        const dv = document.createElement('div'); dv.className = 'meta-val'; dv.textContent = String(v);
        row.appendChild(dk); row.appendChild(dv);
        container.appendChild(row);
      }
    }

    // Drag & drop visual
    ['dragover', 'dragenter'].forEach(ev => {
      dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.add('is-drag'); });
    });
    ['dragleave', 'drop'].forEach(ev => {
      dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.remove('is-drag'); });
    });
    dropzone.addEventListener('drop', (e) => {
      const f = e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) handleFile(f);
    });
    fileInput.addEventListener('change', (e) => {
      const f = e.target.files && e.target.files[0];
      if (f) handleFile(f);
    });

    chipRemove.addEventListener('click', reset);
    resetBtn.addEventListener('click', reset);

    function reset() {
      fileInput.value = '';
      fileChip.classList.remove('show');
      panelBefore.classList.remove('show');
      panelAfter.classList.remove('show');
      actionsClean.style.display = 'none';
      actionsDl.style.display = 'none';
      currentId = null; currentStored = null; currentOriginalName = null;
      setStatus('', 'info');
      hideProgress();
    }

    async function handleFile(file) {
      reset();
      chipName.textContent = file.name;
      chipSize.textContent = formatBytes(file.size);
      fileChip.classList.add('show');
      setStatus('Analizando metadata...', 'info');
      showProgress(true);

      try {
        const fd = new FormData();
        fd.append('file', file);
        const r = await fetch(API + '/api/metadata', { method: 'POST', body: fd });
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || 'Error');

        currentId = data.id;
        currentStored = data.storedName;
        currentOriginalName = data.originalName;
        renderMetadata(metaBefore, data.metadata);
        panelBefore.classList.add('show');
        actionsClean.style.display = 'flex';
        setStatus('Revisa la metadata y pulsa "Limpiar mi archivo"', 'info');
      } catch (e) {
        setStatus('Error: ' + e.message, 'err');
      } finally {
        hideProgress();
      }
    }

    cleanBtn.addEventListener('click', async () => {
      if (!currentId) return;
      cleanBtn.disabled = true;
      setStatus('Limpiando archivo...', 'info');
      showProgress(true);
      try {
        const r = await fetch(API + '/api/clean', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: currentId, storedName: currentStored }),
        });
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || 'Error');

        renderMetadata(metaAfter, data.metadata);
        panelAfter.classList.add('show');
        actionsClean.style.display = 'none';
        actionsDl.style.display = 'flex';
        setStatus('Archivo limpio. Revisa la nueva metadata.', 'ok');
        panelAfter.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } catch (e) {
        setStatus('Error: ' + e.message, 'err');
      } finally {
        hideProgress();
        cleanBtn.disabled = false;
      }
    });

    downloadBtn.addEventListener('click', async () => {
      if (!currentId || !currentStored) return;
      try {
        const url = API + '/api/download/' + currentId + '/' + encodeURIComponent(currentStored);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'clean_' + (currentOriginalName || currentStored);
        document.body.appendChild(a);
        a.click();
        a.remove();
        setStatus('Descarga iniciada ✓', 'ok');
      } catch (e) {
        setStatus('Error: ' + e.message, 'err');
      }
    });
  </script>
  <script src="/zonga-memory.js"></script>
</body>
</html>
